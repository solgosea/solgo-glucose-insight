name: smart_xdrip
description: Solgo Insight CGM companion preview for xDrip+ and Nightscout
publish_to: none
version: 0.3.0+3

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^13.2.0

  # HTTP (xDrip+ Web Service / Nightscout API)
  dio: ^5.4.3
  retry: ^3.1.2

  # Storage
  sqflite: ^2.3.2
  shared_preferences: ^2.2.2
  path: ^1.9.0
  path_provider: ^2.1.4
  flutter_secure_storage: ^9.2.2

  # Charts
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.19.0
  collection: ^1.18.0
  crypto: ^3.0.3
  flutter_background_service: ^5.1.0
  flutter_background_service_android: ^6.3.1
  flutter_local_notifications: ^19.5.0
  vibration: ^3.1.8
  audioplayers: ^6.6.0
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3
  mocktail: ^1.0.4
  fake_async: ^1.3.1
  sqflite_common_ffi: ^2.3.3
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/alerts/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_logo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/app_logo_foreground.png
  remove_alpha_ios: true
